name: BatteryOS AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio flake8

      - name: Train ML models (fast mode)
        run: |
          cd ml
          pip install -r requirements.txt
          python training/train_degradation_model.py
          python training/train_thermal_model.py
          python training/train_anomaly_model.py
          cp models/*.pkl ../backend/ml_models/

      - name: Lint
        run: cd backend && flake8 app/ --max-line-length=120 --ignore=E501,W503 --exclude=alembic/

      - name: Run tests
        run: cd backend && python -m pytest tests/ -v --tb=short

  frontend-check:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Type check
        run: cd frontend && npm run type-check

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-check]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t batteryos-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t batteryos-frontend:ci ./frontend

      - name: Verify compose config
        run: docker-compose config --quiet

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Deploy notification
        run: echo "Deploying BatteryOS AI to staging environment"
      # Add real deployment steps here (AWS ECS, k8s, etc.)

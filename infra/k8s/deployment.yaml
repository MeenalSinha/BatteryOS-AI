apiVersion: apps/v1
kind: Deployment
metadata:
  name: batteryos-backend
  labels:
    app: batteryos-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: batteryos-backend
  template:
    metadata:
      labels:
        app: batteryos-backend
    spec:
      containers:
        - name: backend
          image: batteryos/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: batteryos-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: batteryos-secrets
                  key: redis-url
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: batteryos-backend-svc
spec:
  selector:
    app: batteryos-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: batteryos-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: batteryos-frontend
  template:
    metadata:
      labels:
        app: batteryos-frontend
    spec:
      containers:
        - name: frontend
          image: batteryos/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.batteryos.ai"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://api.batteryos.ai"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: batteryos-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: batteryos-backend
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

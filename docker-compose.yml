version: "3.9"

services:
  # ─── Data Layer ─────────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: batteryos_postgres
    environment:
      POSTGRES_USER: batteryos
      POSTGRES_PASSWORD: batteryos_secret
      POSTGRES_DB: batteryos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batteryos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: batteryos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  influxdb:
    image: influxdb:2.7
    container_name: batteryos_influx
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: batteryos_secret
      DOCKER_INFLUXDB_INIT_ORG: batteryos
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: batteryos-super-secret-auth-token
    ports:
      - "8086:8086"
    volumes:
      - influx_data:/var/lib/influxdb2

  # ─── Messaging ──────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: batteryos_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/docker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: batteryos_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://batteryos:batteryos_secret@postgres:5432/batteryos
      REDIS_URL: redis://redis:6379
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: batteryos-super-secret-auth-token
      INFLUX_ORG: batteryos
      INFLUX_BUCKET: telemetry
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      SECRET_KEY: "batteryos-jwt-secret-change-in-production"
      ENVIRONMENT: development
      DEGRADATION_MODEL_PATH: /app/ml_models/degradation_model.pkl
      THERMAL_MODEL_PATH: /app/ml_models/thermal_model.pkl
      ANOMALY_MODEL_PATH: /app/ml_models/anomaly_model.pkl
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml/models:/app/ml_models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── IoT Telemetry Generator ────────────────────────────────────────────────
  telemetry_gen:
    build:
      context: ./iot/telemetry-gen
      dockerfile: Dockerfile
    container_name: batteryos_telemetry
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      BACKEND_URL: http://backend:8000
      NUM_VEHICLES: "10"
      SCENARIO: mixed
    depends_on:
      - mosquitto
      - backend
    restart: unless-stopped

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: batteryos_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ─── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: batteryos_nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ─── Observability ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: batteryos_prometheus
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.0
    container_name: batteryos_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: batteryos
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/batteryos.json
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboard.json:/var/lib/grafana/dashboards/batteryos.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  influx_data:
  mosquitto_data:
  prometheus_data:
  grafana_data:
